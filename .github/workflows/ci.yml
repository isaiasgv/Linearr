name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/linearr

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ── Release candidate: push to release/* branch ───────────────────────────
  rc:
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute RC version
        id: version
        run: |
          BASE=$(node -p "require('./frontend/package.json').version")
          # Count commits on this branch since it diverged from main
          COMMIT_COUNT=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo "1")
          VERSION="${BASE}-rc.${COMMIT_COUNT}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=linearr-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "RC version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rc

      - name: Create RC pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Linearr v${{ steps.version.outputs.version }}
          body: "Release candidate `${{ steps.version.outputs.version }}` — built from `${{ github.ref_name }}` branch."
          draft: false
          prerelease: true
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stable release: merge to main ─────────────────────────────────────────
  release:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Read version and generate changelog
        id: version
        working-directory: frontend
        run: |
          npx standard-version --release-as patch --skip.bump
          VERSION=$(node -p "require('./package.json').version")
          TAG="linearr-v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push changelog and tag
        run: git push --follow-tags origin main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Extract changelog for release
        id: changelog
        working-directory: frontend
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BODY=$(awk '/^## \[?'"$VERSION"'/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release v${VERSION}"
          fi
          echo "$BODY" > /tmp/release-notes.md

      - name: Delete RC pre-releases for this version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release list --limit 50 --json tagName,isPrerelease -q ".[] | select(.isPrerelease and (.tagName | startswith(\"linearr-v${VERSION}-rc\"))) | .tagName" | while read tag; do
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Linearr v${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
